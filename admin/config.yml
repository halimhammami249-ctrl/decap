backend:
  name: git-gateway
  branch: main

media_folder: 'images'
public_folder: '/images'

collections:
  - name: 'products'
    label: 'Products'
    files:
      - file: 'products.json'
        label: 'Product List'
        name: 'products'
        fields:
          - name: products
            label: Products
            widget: list
            fields:
              - { label: 'Name', name: 'name', widget: 'string' }
              - { label: 'Price', name: 'price', widget: 'number' }
              - { label: 'Image', name: 'image', widget: 'image' }
              - { label: 'Description', name: 'description', widget: 'text' }
